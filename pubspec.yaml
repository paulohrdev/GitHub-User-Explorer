name: github_user_explorer
description: "Listagem de repositórios públicos do GitHub"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any
  dio: ^5.9.2
  shimmer: ^3.0.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  hive_ce: ^2.19.3
  flutter_svg: ^2.3.0
  either_dart: ^1.0.0
  equatable: ^2.0.8
  signals_flutter: ^6.3.0
  signals_core: ^6.2.1
  flutter_dotenv: ^5.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/languages/
    - assets/images/
    - assets/icons/
    - .env