name: github_user_explorer
description: "Listagem de repositórios públicos do GitHub"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any
  shimmer: ^3.0.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  hive_ce: ^2.19.3
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env